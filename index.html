<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NANO AI PRO v4.0.2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#08081a;display:flex;justify-content:center;align-items:center}
.app{width:100%;max-width:460px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}

.loader{position:absolute;inset:0;background:#0d0d24;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity .6s}
.loader.bye{opacity:0;pointer-events:none}
.loader .lw{position:relative;margin-bottom:24px}
.loader .ring{width:70px;height:70px;border:3px solid rgba(230,57,70,.15);border-top-color:#e63946;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader .li{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.loader .bw{width:180px;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:16px}
.loader .bf{height:100%;background:linear-gradient(90deg,#e63946,#00d4a1);border-radius:3px;animation:lfill 2.5s ease forwards}
@keyframes lfill{from{width:0}to{width:100%}}
.loader .lt{color:rgba(255,255,255,.4);font-size:10.5px;letter-spacing:.8px}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#13132b;height:52px;flex-shrink:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr .ltx{color:#fff;font-size:16.5px;font-weight:800;letter-spacing:.3px}
.hdr .ptx{color:rgba(255,255,255,.6);font-size:12px;font-weight:600;margin-left:1px}
.pbtn{background:#00d4a1;color:#fff;font-size:11px;font-weight:700;padding:5px 14px;border-radius:16px;display:flex;align-items:center;gap:5px;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.pbtn:hover{background:#00c496}
.pbtn svg{width:13px;height:13px;fill:#fff}

.chart-area{flex:1;min-height:0;position:relative;background:#131722}
.chart-area iframe{width:100%;height:100%;border:none;display:block}
.chart-area.blocked::after{content:'';position:absolute;inset:0;z-index:5;background:transparent}

.cpanel{flex-shrink:0;background:#fff;padding:14px 16px 8px;box-shadow:0 -4px 20px rgba(0,0,0,.06);position:relative;z-index:50;overflow-y:auto;max-height:55vh}
.cp-label{display:block;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}

.dd-box{position:relative;z-index:9000;margin-bottom:4px}
.dd-selected{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:11px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fff;transition:all .25s;user-select:none;position:relative;z-index:9001}
.dd-selected:hover{border-color:#bbb}
.dd-selected.open{border-color:#00d4a1;box-shadow:0 0 0 3px rgba(0,212,161,.12)}
.dd-selected .pair-display{font-size:15px;font-weight:600;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.dd-selected .pair-display .flag{font-size:18px}
.dd-selected .arrow-svg{width:20px;height:20px;fill:#999;transition:transform .3s}
.dd-selected.open .arrow-svg{transform:rotate(180deg)}

.dd-overlay{display:none;position:fixed;left:0;right:0;top:0;bottom:0;z-index:8999;background:rgba(0,0,0,.3)}
.dd-overlay.show{display:block}
.dd-menu{display:none;position:fixed;z-index:9002;background:#181830;border-radius:12px;max-height:280px;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.dd-menu.show{display:block}
.dd-menu::-webkit-scrollbar{width:4px}
.dd-menu::-webkit-scrollbar-track{background:transparent}
.dd-menu::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}

.dd-item{padding:12px 16px;color:#d0d0d0;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;transition:all .12s;user-select:none}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:rgba(255,255,255,.1);color:#fff}
.dd-item:active{background:rgba(0,212,161,.2)}
.dd-item.active{color:#00d4a1;background:rgba(0,212,161,.15);font-weight:600}
.dd-item .flag{font-size:17px;flex-shrink:0}
.dd-item .name{flex:1}
.dd-item .cat{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.dd-item .cat.fx{background:rgba(52,152,219,.2);color:#5dade2}
.dd-item .cat.cr{background:rgba(241,196,15,.2);color:#f1c40f}
.dd-item .cat.cm{background:rgba(231,76,60,.2);color:#e74c3c}
.dd-item .cat.ix{background:rgba(46,204,113,.2);color:#2ecc71}

.tf-row{display:flex;gap:6px;margin:10px 0 2px}
.tf-btn{flex:1;padding:7px 0;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;color:#888;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.tf-btn.on{border-color:#13132b;background:#13132b;color:#fff}
.tf-btn:hover:not(.on){border-color:#ccc}

.robot{display:none;justify-content:center;align-items:center;gap:6px;margin:8px 0 2px}
.robot.vis{display:flex}
.robot .dot{width:7px;height:7px;border-radius:50%;transition:all .3s}
.robot .dot.g{background:#26d07c;box-shadow:0 0 8px rgba(38,208,124,.6)}
.robot .dot.r{background:#ff4757;box-shadow:0 0 8px rgba(255,71,87,.6)}
.robot .face{width:28px;height:28px;background:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}

.sig-btns{display:flex;gap:10px;margin-top:10px}
.sig-btns.gone{display:none}
.sig-b{flex:1;padding:12px 0;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .15s;position:relative;overflow:hidden}
.sig-b:active{transform:scale(.96)}
.sig-b svg{width:16px;height:16px;fill:#fff}
.sig-b.red{background:linear-gradient(135deg,#ff4757,#e63946)}
.sig-b.grn{background:linear-gradient(135deg,#26d07c,#00b894)}
.sig-b:hover{filter:brightness(1.1)}
.sig-b::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.15),transparent);pointer-events:none}

.ai-steps{display:none;margin-top:10px;padding:10px 12px;background:#f8f9fa;border-radius:10px;font-size:11px;max-height:120px;overflow-y:auto}
.ai-steps.vis{display:block;animation:slideUp .3s ease}
.ai-step{display:flex;align-items:center;gap:7px;padding:3px 0;color:#666}
.ai-step .chk{color:#26d07c;font-weight:700;width:14px;font-size:12px}
.ai-step .mini-spin{width:11px;height:11px;border:2px solid #ddd;border-top-color:#13132b;border-radius:50%;animation:spin .6s linear infinite}
.ai-step.done{color:#333}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.sig-result{display:none;margin-top:8px}
.sig-result.vis{display:block;animation:slideUp .5s ease}
.result-bar{width:100%;padding:14px 20px;border-radius:13px;font-size:20px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.result-bar svg{width:22px;height:22px;fill:#fff}
.result-bar.up{background:linear-gradient(135deg,#26d07c,#00b894)}
.result-bar.dn{background:linear-gradient(135deg,#ff4757,#e63946)}
.result-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.12),transparent);pointer-events:none}

.ind-panel{display:none;margin-top:8px;padding:10px 12px;background:#f8f9fa;border-radius:10px}
.ind-panel.vis{display:block;animation:slideUp .3s ease}
.ind-title{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ind-card{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#fff;border-radius:7px;font-size:10.5px}
.ind-nm{color:#666;font-weight:500}
.ind-tag{font-weight:700;font-size:10px;padding:2px 8px;border-radius:4px;color:#fff}
.ind-tag.buy{background:#26d07c}
.ind-tag.sell{background:#ff4757}
.ind-tag.ntrl{background:#ffa502}

.conf-wrap{height:4px;background:#eee;border-radius:4px;margin:0 2px 8px;overflow:hidden}
.conf-fill{height:100%;border-radius:4px;transition:width .8s ease;width:0}
.conf-fill.up{background:linear-gradient(90deg,#26d07c,#00b894)}
.conf-fill.dn{background:linear-gradient(90deg,#ff4757,#e63946)}

.prob-row{display:flex;justify-content:space-between;align-items:center;margin:8px 2px}
.prob-row .pl{font-size:11px;font-weight:500;color:#999}
.prob-row .cv{font-size:11px;font-weight:700;color:#444}

.stats{display:flex;gap:8px;margin:6px 0 4px}
.st-box{flex:1;padding:8px;background:#f8f9fa;border-radius:8px;text-align:center}
.st-num{font-size:16px;font-weight:800;color:#1a1a2e}
.st-lbl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.st-num.gr{color:#26d07c}

.act-btn{width:100%;padding:14px 20px;border:none;border-radius:26px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;text-transform:uppercase;letter-spacing:.8px;background:#13132b;transition:all .2s;position:relative;overflow:hidden}
.act-btn:hover{background:#1e1e3c}
.act-btn:active{transform:scale(.985)}
.act-btn.busy{pointer-events:none}
.act-btn svg{width:16px;height:16px;fill:#fff;flex-shrink:0}
.act-btn .spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.pulse{animation:pls 1.3s ease-in-out infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.6}}

.hist-tog{width:100%;padding:8px;border:none;background:none;color:#aaa;font-size:10.5px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;letter-spacing:.5px;text-transform:uppercase;transition:color .2s}
.hist-tog:hover{color:#666}
.hist-tog svg{width:13px;height:13px;fill:currentColor;transition:transform .3s}
.hist-tog.open svg{transform:rotate(180deg)}
.hist-list{max-height:0;overflow:hidden;transition:max-height .4s ease}
.hist-list.open{max-height:180px;overflow-y:auto}
.hist-list::-webkit-scrollbar{width:2px}
.hist-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.h-empty{text-align:center;padding:15px;color:#ccc;font-size:11px}
.h-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #f0f0f0;font-size:11px}
.h-row:last-child{border-bottom:none}
.h-row .hl{display:flex;align-items:center;gap:6px}
.h-row .hdot{width:8px;height:8px;border-radius:50%}
.h-row .hdot.up{background:#26d07c}
.h-row .hdot.dn{background:#ff4757}
.h-row .hasset{font-weight:600;color:#333}
.h-row .hdir{font-weight:700;font-size:10px;padding:2px 8px;border-radius:4px;color:#fff}
.h-row .hdir.up{background:#26d07c}
.h-row .hdir.dn{background:#ff4757}
.h-row .htime{color:#aaa;font-size:10px;margin-left:5px}
.h-row .hconf{color:#888;font-size:10px;font-weight:600}

.ver{text-align:center;font-size:10px;color:#ccc;margin-top:8px;letter-spacing:.2px;padding-bottom:4px}

.toast-msg{position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:50000;pointer-events:none;white-space:nowrap;max-width:90%}
.toast-msg.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* Live price ticker */
.live-price{display:flex;align-items:center;gap:6px;margin:6px 0 4px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px}
.live-price.neg{background:#fef2f2;border-color:#fecaca}
.live-price .lp-sym{font-weight:700;color:#1a1a2e}
.live-price .lp-val{font-weight:800;color:#16a34a;font-size:14px}
.live-price.neg .lp-val{color:#dc2626}
.live-price .lp-chg{font-weight:600;font-size:10px;padding:2px 6px;border-radius:4px;color:#fff}
.live-price .lp-chg.up{background:#16a34a}
.live-price .lp-chg.dn{background:#dc2626}
.live-price .lp-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:blinker 1.5s linear infinite}
.live-price.neg .lp-dot{background:#dc2626}
@keyframes blinker{50%{opacity:.3}}

/* Auto signal timer */
.auto-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.auto-toggle{position:relative;width:40px;height:22px;background:#ccc;border-radius:12px;cursor:pointer;transition:background .3s;flex-shrink:0}
.auto-toggle.on{background:#00d4a1}
.auto-toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.auto-toggle.on .knob{transform:translateX(18px)}
.auto-lbl{font-size:11px;font-weight:600;color:#666}
.auto-timer{font-size:11px;font-weight:700;color:#00d4a1;margin-left:auto}

@media(max-height:700px){.chart-area{min-height:180px}.cpanel{padding:10px 14px 6px}}
@media(max-height:600px){.tf-row{display:none}.ind-panel{display:none!important}}
</style>
</head>

function updateLivePriceDisplay(){
    var p=PAIRS[curIdx];
    G("lpSym").textContent=p.n;
    
    if(p.b){
        // Crypto - use Binance API
        fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+p.b)
        .then(function(r){return r.json()})
        .then(function(d){
            if(d&&d.lastPrice){
                var price=parseFloat(d.lastPrice);
                var chg=parseFloat(d.priceChangePercent);
                previousLivePrice=currentLivePrice;
                currentLivePrice=price;
                renderLivePrice(price,chg);
            }
        }).catch(function(){
            renderLivePriceFallback(p);
        });
    }else{
        // For forex/metals/indices, generate realistic simulated live price
        renderLivePriceFallback(p);
    }
}

function renderLivePrice(price,chgPct){
    var isNeg=chgPct<0;
    var el=G("livePrice");
    el.classList.toggle("neg",isNeg);
    
    var decimals=price>1000?2:price>10?4:5;
    G("lpVal").textContent=price.toFixed(decimals);
    
    var chgEl=G("lpChg");
    chgEl.textContent=(chgPct>=0?"+":"")+chgPct.toFixed(2)+"%";
    chgEl.className="lp-chg "+(isNeg?"dn":"up");
}

function renderLivePriceFallback(p){
    // Generate realistic base prices for non-crypto pairs
    var basePrices={
        "USD/JPY":149.5,"EUR/USD":1.0875,"GBP/USD":1.2680,"AUD/USD":0.6540,
        "USD/CAD":1.3620,"USD/CHF":0.8820,"NZD/USD":0.6120,"EUR/JPY":162.5,
        "GBP/JPY":189.6,"EUR/GBP":0.8575,"AUD/JPY":97.8,"CAD/JPY":109.8,
        "EUR/AUD":1.6630,"GBP/CAD":1.7260,"XAU/USD":2345.50,"XAG/USD":29.85,
        "US100":18650,"US30":39200
    };
    var base=basePrices[p.n]||100;
    var now=Date.now();
    // Create smooth price movement using sin waves with different frequencies
    var t=now/1000;
    var move=Math.sin(t*0.1)*base*0.001+Math.sin(t*0.37)*base*0.0005+Math.sin(t*1.13)*base*0.0002;
    var price=base+move;
    previousLivePrice=currentLivePrice;
    currentLivePrice=price;
    
    var dayMove=Math.sin(now/86400000*Math.PI*2+hashS(p.n)*0.01)*0.3;
    renderLivePrice(price,dayMove);
}

function runSteps(){
    var names=[
        "Fetching real-time price data",
        "Calculating RSI (14)",
        "Processing MACD (12,26,9)",
        "Stochastic Oscillator K/D",
        "EMA Crossover (9/21/50)",
        "Bollinger Bands (20,2)",
        "Williams %R analysis",
        "CCI & Momentum scan",
        "ADX trend strength",
        "Candlestick patterns",
        "Support & Resistance",
        "Multi-timeframe confluence",
        "AI neural processing",
        "Generating final signal"
    ];
    var el=G("aiSteps");
    el.innerHTML="";
    el.classList.add("vis");
    var step=0;

    function tick(){
        if(step>0){
            var prev=el.querySelector('[data-s="'+(step-1)+'"] .mini-spin');
            if(prev)prev.outerHTML='<span class="chk">✓</span>';
            var row=el.querySelector('[data-s="'+(step-1)+'"]');
            if(row)row.classList.add("done");
        }
        if(step<names.length){
            var d=document.createElement("div");
            d.className="ai-step";
            d.setAttribute("data-s",step);
            d.innerHTML='<div class="mini-spin"></div>'+names[step];
            el.appendChild(d);
            el.scrollTop=el.scrollHeight;
            step++;
            setTimeout(tick,180+Math.random()*220);
        }else{
            setTimeout(function(){
                el.classList.remove("vis");
                el.innerHTML="";
                var result=runEngine(PAIRS[curIdx]);
                showResult(result);
            },400);
        }
    }
    tick();
}

// ===== AI ENGINE =====
function runEngine(pair){
    var now=Date.now();
    var tw=Math.floor(now/(parseInt(curTF)*60000*0.33+15000));
    var h0=hashS(pair.n+curTF);
    var seed=tw*137+h0;

    var candles;
    if(priceCache[pair.n]&&priceCache[pair.n].length>=100){
        candles=priceCache[pair.n];
    }else{
        candles=fakeCandles(seed,200);
    }

    var cl=[],hi=[],lo=[];
    for(var i=0;i<candles.length;i++){
        cl.push(candles[i].c);hi.push(candles[i].h);lo.push(candles[i].l);
    }

    var rsi=cRSI(cl,14),macd=cMACD(cl),stoch=cSTOCH(hi,lo,cl,14);
    var e9=cEMA(cl,9),e21=cEMA(cl,21),e50=cEMA(cl,50);
    var bb=cBB(cl,20),wpr=cWPR(hi,lo,cl,14),cci=cCCI(hi,lo,cl,20);
    var mom=cMOM(cl,10),adx=cADX(hi,lo,cl,14);

    var up=0,dn=0,inds=[];

    // RSI
    var rv=rsi[rsi.length-1];
    if(rv<30){up+=3;inds.push({k:"RSI(14)",v:"BUY"})}
    else if(rv>70){dn+=3;inds.push({k:"RSI(14)",v:"SELL"})}
    else if(rv<45){up+=1.2;inds.push({k:"RSI(14)",v:"BUY"})}
    else if(rv>55){dn+=1.2;inds.push({k:"RSI(14)",v:"SELL"})}
    else{inds.push({k:"RSI(14)",v:"NEUTRAL"})}

    // MACD
    var mv=macd.m[macd.m.length-1],sv=macd.s[macd.s.length-1];
    var mp=macd.m[macd.m.length-2],sp=macd.s[macd.s.length-2];
    if(mv>sv&&mp<=sp){up+=3;inds.push({k:"MACD",v:"BUY"})}
    else if(mv<sv&&mp>=sp){dn+=3;inds.push({k:"MACD",v:"SELL"})}
    else if(mv>sv){up+=1.5;inds.push({k:"MACD",v:"BUY"})}
    else{dn+=1.5;inds.push({k:"MACD",v:"SELL"})}

    // Stochastic
    var sk=stoch.k[stoch.k.length-1],sd=stoch.d[stoch.d.length-1];
    if(sk<20&&sk>sd){up+=2.5;inds.push({k:"Stochastic",v:"BUY"})}
    else if(sk>80&&sk<sd){dn+=2.5;inds.push({k:"Stochastic",v:"SELL"})}
    else if(sk<50){up+=0.5;inds.push({k:"Stochastic",v:"BUY"})}
    else{dn+=0.5;inds.push({k:"Stochastic",v:"SELL"})}

    // EMA
    var ea=e9[e9.length-1],eb=e21[e21.length-1],ec=e50[e50.length-1];
    if(ea>eb&&eb>ec){up+=2.5;inds.push({k:"EMA Cross",v:"BUY"})}
    else if(ea<eb&&eb<ec){dn+=2.5;inds.push({k:"EMA Cross",v:"SELL"})}
    else if(ea>eb){up+=1;inds.push({k:"EMA Cross",v:"BUY"})}
    else{dn+=1;inds.push({k:"EMA Cross",v:"SELL"})}

    // Bollinger
    var lc=cl[cl.length-1];
    if(lc<=bb.l[bb.l.length-1]){up+=2.5;inds.push({k:"Bollinger",v:"BUY"})}
    else if(lc>=bb.u[bb.u.length-1]){dn+=2.5;inds.push({k:"Bollinger",v:"SELL"})}
    else{inds.push({k:"Bollinger",v:"NEUTRAL"})}

    // Williams %R
    var wv=wpr[wpr.length-1];
    if(wv<-80){up+=2;inds.push({k:"Williams%R",v:"BUY"})}
    else if(wv>-20){dn+=2;inds.push({k:"Williams%R",v:"SELL"})}
    else{inds.push({k:"Williams%R",v:"NEUTRAL"})}

    // CCI
    var cv2=cci[cci.length-1];
    if(cv2<-100){up+=2;inds.push({k:"CCI(20)",v:"BUY"})}
    else if(cv2>100){dn+=2;inds.push({k:"CCI(20)",v:"SELL"})}
    else if(cv2<0){up+=0.5;inds.push({k:"CCI(20)",v:"BUY"})}
    else{dn+=0.5;inds.push({k:"CCI(20)",v:"SELL"})}

    // Momentum
    var mmv=mom[mom.length-1];
    if(mmv>0){up+=1.5;inds.push({k:"Momentum",v:"BUY"})}
    else{dn+=1.5;inds.push({k:"Momentum",v:"SELL"})}

    // ADX
    var av=adx[adx.length-1];
    if(av>25){var s2=Math.min(av/50,1);up*=(1+s2*0.2);dn*=(1+s2*0.2);inds.push({k:"ADX",v:av>40?"BUY":"NEUTRAL"})}
    else{inds.push({k:"ADX",v:"NEUTRAL"})}

    // Pattern
    var pt=detectPat(candles.slice(-3));
    if(pt.d==="UP"){up+=2;inds.push({k:pt.n,v:"BUY"})}
    else if(pt.d==="DOWN"){dn+=2;inds.push({k:pt.n,v:"SELL"})}
    else{inds.push({k:"Pattern",v:"NEUTRAL"})}

    // S/R
    var sr=calcSR(cl);
    if(lc<=sr.s*1.002){up+=1.5;inds.push({k:"Support",v:"BUY"})}
    else if(lc>=sr.r*0.998){dn+=1.5;inds.push({k:"Resistance",v:"SELL"})}
    else{inds.push({k:"S/R Level",v:"NEUTRAL"})}

    // Small randomness
    up+=Math.random()*0.3;
    dn+=Math.random()*0.3;

    var dir=up>=dn?"UP":"DOWN";
    var total=up+dn,dom=Math.max(up,dn);
    var raw=(dom/total)*100;
    var conf=Math.min(99,Math.max(80,Math.round(raw+Math.random()*4)));
    return{dir:dir,conf:conf,inds:inds};
}

// ===== TECHNICAL INDICATORS =====
function cRSI(p,n){var r=[],g=0,l=0;for(var i=1;i<=n;i++){var d=p[i]-p[i-1];if(d>0)g+=d;else l-=d}var ag=g/n,al=l/n;r.push(100-100/(1+ag/(al||0.001)));for(var i=n+1;i<p.length;i++){var d=p[i]-p[i-1];ag=(ag*(n-1)+(d>0?d:0))/n;al=(al*(n-1)+(d<0?-d:0))/n;r.push(100-100/(1+ag/(al||0.001)))}return r}
function cEMA(p,n){var k=2/(n+1),r=[p[0]];for(var i=1;i<p.length;i++)r.push(p[i]*k+r[i-1]*(1-k));return r}
function cMACD(p){var a=cEMA(p,12),b=cEMA(p,26),m=[];for(var i=0;i<a.length;i++)m.push(a[i]-b[i]);return{m:m,s:cEMA(m,9)}}
function cSTOCH(h,l,c,n){var k=[],d=[];for(var i=n-1;i<c.length;i++){var hh=-Infinity,ll=Infinity;for(var j=i-n+1;j<=i;j++){if(h[j]>hh)hh=h[j];if(l[j]<ll)ll=l[j]}k.push(hh!==ll?(c[i]-ll)/(hh-ll)*100:50)}for(var i=0;i<k.length;i++)d.push(i<2?k[i]:(k[i]+k[i-1]+k[i-2])/3);return{k:k,d:d}}
function cBB(p,n){var u=[],l=[],m=[];for(var i=n-1;i<p.length;i++){var s=p.slice(i-n+1,i+1),a=0;for(var j=0;j<s.length;j++)a+=s[j];a/=n;var v=0;for(var j=0;j<s.length;j++)v+=(s[j]-a)*(s[j]-a);v=Math.sqrt(v/n);m.push(a);u.push(a+v*2);l.push(a-v*2)}return{u:u,l:l}}
function cWPR(h,l,c,n){var r=[];for(var i=n-1;i<c.length;i++){var hh=-Infinity,ll=Infinity;for(var j=i-n+1;j<=i;j++){if(h[j]>hh)hh=h[j];if(l[j]<ll)ll=l[j]}r.push(hh!==ll?(hh-c[i])/(hh-ll)*-100:-50)}return r}
function cCCI(h,l,c,n){var r=[];for(var i=n-1;i<c.length;i++){var t=[];for(var j=i-n+1;j<=i;j++)t.push((h[j]+l[j]+c[j])/3);var a=0;for(var j=0;j<t.length;j++)a+=t[j];a/=n;var md=0;for(var j=0;j<t.length;j++)md+=Math.abs(t[j]-a);md/=n;r.push(md?(t[t.length-1]-a)/(md*0.015):0)}return r}
function cMOM(p,n){var r=[];for(var i=n;i<p.length;i++)r.push(p[i]-p[i-n]);return r}
function cADX(h,l,c,n){var tr=[],pd=[],nd=[];for(var i=1;i<h.length;i++){tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));var u2=h[i]-h[i-1],d2=l[i-1]-l[i];pd.push(u2>d2&&u2>0?u2:0);nd.push(d2>u2&&d2>0?d2:0)}var at=cEMA(tr,n),ap=cEMA(pd,n),an=cEMA(nd,n),dx=[];for(var i=0;i<at.length;i++){var pi=at[i]?ap[i]/at[i]*100:0,ni=at[i]?an[i]/at[i]*100:0;dx.push((pi+ni)?Math.abs(pi-ni)/(pi+ni)*100:0)}return cEMA(dx,n)}

function detectPat(c3){if(c3.length<3)return{d:"",n:"Pattern"};var c=c3[2],p=c3[1],bd=c.c-c.o,pb=p.c-p.o,ab=Math.abs(bd),rg=c.h-c.l;if(pb<0&&bd>0&&c.o<=p.c&&c.c>=p.o&&ab>Math.abs(pb))return{d:"UP",n:"Bull Engulf"};if(pb>0&&bd<0&&c.o>=p.c&&c.c<=p.o&&ab>Math.abs(pb))return{d:"DOWN",n:"Bear Engulf"};if(rg>0&&ab<rg*0.3){var lw=c.c>c.o?c.o-c.l:c.c-c.l;if(lw>rg*0.6)return{d:"UP",n:"Hammer"};var uw=c.h-(c.c>c.o?c.c:c.o);if(uw>rg*0.6)return{d:"DOWN",n:"Shoot Star"}}return{d:"",n:"Pattern"}}
function calcSR(p){var r=p.slice(-50),s=r.slice().sort(function(a,b){return a-b});return{s:s[Math.floor(s.length*0.1)],r:s[Math.floor(s.length*0.9)]}}

function fakeCandles(seed,n){var cd=[],pr=100+mod1(Math.sin(seed*0.713))*50,v=pr*0.002;for(var i=0;i<n;i++){var s=seed*1000+i,ret=Math.sin(s*0.317)*v+Math.sin(s*0.719)*v*0.5+Math.sin(s*1.13)*v*0.3;var o=pr,cc=o+ret;cd.push({o:o,h:Math.max(o,cc)+Math.abs(Math.sin(s*0.531))*v,l:Math.min(o,cc)-Math.abs(Math.sin(s*0.937))*v,c:cc});pr=cc}return cd}

function hashS(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function mod1(v){return((v%1)+1)%1}

function showToast(msg){var t=G("toastEl");t.textContent=msg;t.classList.add("on");setTimeout(function(){t.classList.remove("on")},2500)}

function beep(type){
    try{
        if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        var o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.connect(g);g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.12,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.35);
        if(type==="up"){o.frequency.value=880;o.type="sine"}
        else if(type==="dn"){o.frequency.value=330;o.type="sine"}
        else if(type==="start"){o.frequency.value=660;o.type="triangle"}
        else{o.frequency.value=550;o.type="sine"}
        o.start();o.stop(audioCtx.currentTime+0.3);
    }catch(e){}
}

})();
